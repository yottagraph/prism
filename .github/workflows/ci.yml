name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-and-typecheck:
        name: Test & Typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm run test

            - name: Typecheck
              run: npm run typecheck
